apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 294069345642.dkr.ecr.ap-south-1.amazonaws.com/devops-backend:9a91ef99991d5a42696ffe8c7232ce360fca773d
          ports:
            - containerPort: 3000
