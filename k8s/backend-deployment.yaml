apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 294069345642.dkr.ecr.ap-south-1.amazonaws.com/devops-backend:d562b33597de969bfcd4503b47a66fb037b8d57d
          ports:
            - containerPort: 3000
